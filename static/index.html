<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像风格匹配分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.9;
        }
        
        .analyze-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s;
            margin-bottom: 30px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
        }
        
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .cases-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .case-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .case-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }
        
        .case-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .case-card .info {
            padding: 15px;
        }
        
        .case-card h3 {
            color: #333;
            margin-bottom: 8px;
        }
        
        .case-card .style-tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .image-viewer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: zoom-out;
        }
        
        .image-viewer-overlay.active {
            display: flex;
        }
        
        .image-viewer-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }
        
        .image-viewer-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .image-viewer-close {
            position: absolute;
            top: -40px;
            right: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-viewer-close:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 16px;
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            color: #333;
        }
        
        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            padding: 20px;
        }
        
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .image-card {
            text-align: center;
        }
        
        .image-card img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-height: 300px;
            object-fit: contain;
        }
        
        .image-card .label {
            margin-top: 10px;
            font-weight: 600;
            color: #555;
        }
        
        .image-card .score {
            margin-top: 5px;
            font-size: 0.9rem;
            color: #888;
        }
        
        .similarity-section {
            margin-bottom: 30px;
        }
        
        .similarity-section h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .similarity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        
        .similarity-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .similarity-card .label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }
        
        .similarity-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }
        
        .suggestions-section {
            margin-bottom: 20px;
        }
        
        .suggestions-section h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .suggestion-card {
            background: #e8f5e9;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #c8e6c9;
        }
        
        .suggestion-card.network {
            background: #e3f2fd;
            border-color: #90caf9;
        }
        
        .suggestion-card .image-container {
            width: 100%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .suggestion-card.network .image-container {
            background: #e3f2fd;
        }

        .suggestion-card.generated .image-container {
            background: #fff8e1;
        }

        .suggestion-card .image-container img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }
        
        .suggestion-card .image-container .zoom-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 20px 10px 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .suggestion-card .image-container:hover .zoom-overlay {
            opacity: 1;
        }
        
        .suggestion-card .image-container .zoom-icon {
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .suggestion-card .fallback-content {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .suggestion-card .image-link {
            color: #1976d2;
            text-decoration: underline;
            font-size: 11px;
            word-break: break-all;
            text-align: center;
            cursor: pointer;
            display: block;
            overflow: auto;
            max-height: 100px;
        }
        
        .suggestion-card .image-link:hover {
            color: #1565c0;
            text-decoration: none;
        }
        
        .suggestion-card .info {
            padding: 10px;
        }
        
        .suggestion-card .score {
            font-weight: 600;
            color: #2e7d32;
        }
        
        .suggestion-card.network .score {
            color: #1976d2;
        }
        
        .suggestion-card .keywords {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .suggestion-card .source {
            font-size: 0.7rem;
            color: #999;
            margin-top: 3px;
        }
        
        .caption-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .caption-label {
            color: rgba(255,255,255,0.8);
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .caption-text {
            color: white;
            font-weight: 500;
            flex: 1;
            word-break: break-word;
        }
        
        .keywords-info {
            background: #f0f4ff;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #d6dcff;
        }
        
        .keywords-label {
            color: #667eea;
            font-weight: 600;
            margin-right: 8px;
            display: inline-block;
            margin-bottom: 8px;
        }
        
        .keywords-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .keyword-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .generated-section {
            margin-top: 30px;
            border-top: 2px solid #667eea;
            padding-top: 20px;
        }
        
        .generation-prompt-info {
            background: #fff3e0;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #ffcc80;
        }
        
        .prompt-label {
            color: #e65100;
            font-weight: 600;
            margin-right: 8px;
        }
        
        .prompt-text {
            color: #333;
            font-size: 0.9rem;
        }
        
        .suggestion-card.generated {
            background: #fff8e1;
            border: 2px solid #ffd54f;
        }
        
        .suggestion-card.generated .image-container {
            background: #fff8e1;
        }
        
        .suggestion-card.generated .score {
            color: #f57f17;
            font-weight: 600;
        }
        
        .suggestion-card.generated .source {
            color: #f57f17;
        }
        
        .generation-error {
            background: #ffebee;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #ef5350;
        }
        
        .text-to-image-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            margin-right: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .suggestion-card.text-to-image {
            background: #f0f4ff;
            border: 2px solid #667eea;
        }
        
        .suggestion-card.text-to-image .image-container {
            background: #f0f4ff;
        }
        
        .suggestion-card.text-to-image .score {
            color: #667eea;
            font-weight: 600;
        }
        
        .suggestion-card.text-to-image .source {
            color: #667eea;
        }
        
        .metadata-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
        
        .metadata-section h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .metadata-item {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .metadata-item:last-child {
            border-bottom: none;
        }
        
        .metadata-item .key {
            width: 120px;
            font-weight: 600;
            color: #666;
        }
        
        .metadata-item .value {
            flex: 1;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }
        
        .modal-content .loading {
            color: #666;
        }
        
        .modal-content .loading .spinner {
            border-color: rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .section-header h3 {
            margin: 0;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .refresh-btn.loading {
            pointer-events: none;
        }
        
        .refresh-btn .spinner-small {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .refreshing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            z-index: 10;
        }
        
        .refreshing-overlay .spinner {
            width: 30px;
            height: 30px;
            border-color: rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>图像风格匹配分析系统</h1>
            <p>分析badcase数据，找到更合适的风格参考图</p>
        </header>
        
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>正在加载案例列表，请稍候...</p>
        </div>
        
        <div class="cases-list" id="casesList"></div>
        
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="modalTitle">案例详情</h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="modal-content" id="modalContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '';
        
        function formatSimilarity(value) {
            return (value * 100).toFixed(1) + '%';
        }
        
        function createCaseCard(caseName) {
            const card = document.createElement('div');
            card.className = 'case-card';
            card.onclick = () => loadAndShowCaseDetail(caseName);
            
            card.innerHTML = `
                <img src="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🖼️</text></svg>" 
                     alt="${caseName}" 
                     class="case-thumbnail" 
                     data-case="${caseName}" 
                     onload="this.classList.add('loaded')" />
                <div class="info">
                    <h3>${caseName}</h3>
                    <span class="style-tag">加载中...</span>
                </div>
            `;
            
            loadCaseThumbnail(card, caseName);
            return card;
        }
        
        async function loadCaseThumbnail(card, caseName) {
            try {
                const caseData = await fetch(`${API_BASE}/api/cases/${caseName}/info`).then(r => r.json());
                if (caseData && caseData.image_paths?.original) {
                    const fileName = caseData.image_paths.original.split('/').pop();
                    const imageUrl = `/image/${caseName}/${encodeURIComponent(fileName)}`;
                    
                    const img = card.querySelector('img');
                    img.src = imageUrl;
                    img.onerror = () => {
                        img.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🖼️</text></svg>';
                    };
                    
                    const styleTag = card.querySelector('.style-tag');
                    styleTag.textContent = caseData.style || 'Unknown';
                }
            } catch (error) {
                console.error('Error loading thumbnail:', error);
            }
        }
        
        async function loadAndShowCaseDetail(caseName) {
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            
            modalTitle.textContent = caseName;
            modalContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在分析案例，请稍候...</p></div>';
            modalOverlay.classList.add('active');
            
            try {
                const caseData = await fetch(`${API_BASE}/api/analyze/${caseName}`).then(r => r.json());
                showCaseDetail(caseData);
            } catch (error) {
                console.error('Error loading case:', error);
                modalContent.innerHTML = `
                    <div style="text-align: center; padding: 50px; color: #666;">
                        <p>加载失败: ${error.message}</p>
                        <button onclick="loadAndShowCaseDetail('${caseName}')" style="margin-top: 20px; padding: 10px 20px;">重试</button>
                    </div>
                `;
            }
        }
        
        function showCaseDetail(caseData) {
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            
            modalTitle.textContent = caseData.case_name;
            
            const originalPath = caseData.image_paths?.original;
            const referencePath = caseData.image_paths?.reference;
            const resultPath = caseData.image_paths?.result;
            
            let originalUrl = '';
            let referenceUrl = '';
            let resultUrl = '';
            
            if (originalPath) {
                const fileName = originalPath.split('/').pop();
                originalUrl = `/image/${caseData.case_name}/${encodeURIComponent(fileName)}`;
            }
            
            if (referencePath) {
                const fileName = referencePath.split('/').pop();
                referenceUrl = `/image/${caseData.case_name}/${encodeURIComponent(fileName)}`;
            }
            
            if (resultPath) {
                const fileName = resultPath.split('/').pop();
                resultUrl = `/image/${caseData.case_name}/${encodeURIComponent(fileName)}`;
            }
            
            const sim = caseData.similarities || {};
            
            let suggestionsHtml = '';
            if (caseData.suggested_references && caseData.suggested_references.length > 0) {
                suggestionsHtml = `
                    <div class="suggestions-section">
                        <h3>推荐参考图</h3>
                        <div class="suggestions-grid">
                            ${caseData.suggested_references.map((ref, idx) => {
                                let refUrl = '';
                                let isOss = false;
                                if (ref.file_path) {
                                    if (ref.file_path.startsWith('blink-edge/')) {
                                    refUrl = '/oss/' + encodeURIComponent(ref.file_path.substring(11));
                                    isOss = true;
                                } else if (ref.file_path.startsWith('/')) {
                                        const refFileName = ref.file_path.split('/').pop();
                                        const refCaseName = ref.category || caseData.case_name;
                                        refUrl = `/image/${refCaseName}/${encodeURIComponent(refFileName)}`;
                                    } else if (ref.category) {
                                        const refFileName = ref.file_path.split('/').pop();
                                        refUrl = `/image/${ref.category}/${encodeURIComponent(refFileName)}`;
                                    } else {
                                        const refFileName = ref.file_path.split('/').pop();
                                        refUrl = `/image/${caseData.case_name}/${encodeURIComponent(refFileName)}`;
                                    }
                                }
                                return `
                                <div class="suggestion-card${isOss ? ' oss' : ''}">
                                    <div class="image-container" onclick="openImageViewer('${refUrl}')" style="cursor:zoom-in;">
                                        <img src="${refUrl}" alt="推荐图${idx+1}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 120%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22120%22 height=%22120%22/%3E%3Ctext x=%2260%22 y=%2270%22 text-anchor=%22middle%22 font-size=%2248%22%3E🖼️%3C/text%3E%3Ctext x=%2260%22 y=%2295%22 text-anchor=%22middle%22 font-size=%2212%22 fill=%22%23666%22%3E${isOss ? 'OSS' : '本地'}图片加载失败%3C/text%3E%3C/svg%3E'" />
                                        <div class="zoom-overlay">
                                            <span class="zoom-icon">🔍 点击放大</span>
                                        </div>
                                    </div>
                                    <div class="info">
                                        <div class="score">综合评分: ${(ref.combined_score * 100).toFixed(1)}%</div>
                                        <div class="keywords">${ref.keywords || '无关键词'}</div>
                                        ${isOss ? '<div class="source">来源: OSS</div>' : ''}
                                    </div>
                                </div>
                            `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            
            let networkHtml = '';
            if (caseData.network_references && caseData.network_references.length > 0) {
                networkHtml = `
                    <div class="suggestions-section" id="networkSection">
                        <div class="section-header">
                            <h3>网络搜索参考图</h3>
                            <button class="refresh-btn" id="refreshNetworkBtn" onclick="refreshNetworkSearch('${caseData.case_name}')">
                                🔄 重新搜索
                            </button>
                        </div>
                        ${caseData.result_caption ? `
                        <div class="caption-info">
                            <span class="caption-label">结果图描述：</span>
                            <span class="caption-text">${caseData.result_caption}</span>
                        </div>
                        ` : ''}
                        ${caseData.search_keywords && caseData.search_keywords.length > 0 ? `
                        <div class="keywords-info">
                            <span class="keywords-label">搜索关键词：</span>
                            <div class="keywords-tags">
                                ${caseData.search_keywords.map(keyword => `
                                    <span class="keyword-tag">${keyword}</span>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                        <div class="suggestions-grid">
                            ${caseData.network_references.map((ref, idx) => {
                                let imgUrl = ref.image_url || ref.thumbnail_url || ref.original_url || '';
                                if (imgUrl && imgUrl.startsWith('http://')) {
                                    imgUrl = imgUrl.replace('http://', 'https://');
                                }
                                let proxyUrl = '/proxy/image?url=' + encodeURIComponent(imgUrl);
                                return `
                                <div class="suggestion-card network">
                                    <div class="image-container" onclick="openImageViewer('${imgUrl}')" style="cursor:zoom-in;">
                                        <img src="${proxyUrl}" alt="网络图${idx+1}" 
                                             onerror="handleImageError(this);" />
                                        <div class="zoom-overlay">
                                            <span class="zoom-icon">🔍 点击放大</span>
                                        </div>
                                        <div class="fallback-content" style="display:none;">
                                            <p style="font-size:12px;color:#666;margin-bottom:8px;">🖼️ 图片加载失败</p>
                                            <a href="${imgUrl}" target="_blank" rel="noopener noreferrer" 
                                               class="image-link">${imgUrl}</a>
                                        </div>
                                    </div>
                                    <div class="info">
                                        <div class="score">相似度: ${(ref.similarity * 100).toFixed(1)}%</div>
                                        <div class="keywords">${ref.title || '无标题'}</div>
                                        <div class="source">来源: ${ref.source || '网络'}</div>
                                    </div>
                                </div>
                            `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            
            let generatedHtml = '';
            if (caseData.generated_references && caseData.generated_references.length > 0) {
                generatedHtml = `
                    <div class="suggestions-section generated-section" id="generatedSection">
                        <div class="section-header">
                            <h3>
                                <span class="text-to-image-badge">🎨 文生图</span>
                                生成的参考图
                            </h3>
                            <button class="refresh-btn" id="refreshGeneratedBtn" onclick="refreshGeneratedImages('${caseData.case_name}')">
                                🔄 重新生成
                            </button>
                        </div>
                        ${caseData.generation_prompt ? `
                        <div class="generation-prompt-info">
                            <span class="prompt-label">文生图 Prompt：</span>
                            <span class="prompt-text">${caseData.generation_prompt}</span>
                        </div>
                        ` : ''}
                        <div class="suggestions-grid">
                            ${caseData.generated_references.map((imgUrl, idx) => {
                                // 本地生成的图片直接使用路径，外部URL使用proxy
                                let displayUrl = imgUrl;
                                let viewerUrl = imgUrl;
                                if (imgUrl.startsWith('http')) {
                                    displayUrl = '/proxy/image?url=' + encodeURIComponent(imgUrl);
                                }
                                return `
                                <div class="suggestion-card generated text-to-image">
                                    <div class="image-container" onclick="openImageViewer('${viewerUrl}')" style="cursor:zoom-in;">
                                        <img src="${displayUrl}" alt="文生图${idx+1}" 
                                             onerror="handleImageError(this);" />
                                        <div class="zoom-overlay">
                                            <span class="zoom-icon">🔍 点击放大</span>
                                        </div>
                                        <div class="fallback-content" style="display:none;">
                                            <p style="font-size:12px;color:#666;margin-bottom:8px;">🖼️ 图片加载失败</p>
                                            <a href="${imgUrl}" target="_blank" rel="noopener noreferrer" 
                                               class="image-link">${imgUrl}</a>
                                        </div>
                                    </div>
                                    <div class="info">
                                        <div class="score">文生图 ${idx+1}</div>
                                        <div class="source">来源: 豆包文生图模型</div>
                                    </div>
                                </div>
                            `;
                            }).join('')}
                        </div>
                    </div>
                `;
            } else if (caseData.generation_error) {
                generatedHtml = `
                    <div class="suggestions-section generated-section">
                        <h3>
                            <span class="text-to-image-badge">🎨 文生图</span>
                            生成的参考图
                        </h3>
                        <div class="generation-error">
                            <p style="color: #dc3545;">生成失败: ${caseData.generation_error}</p>
                        </div>
                    </div>
                `;
            }
            
            modalContent.innerHTML = `
                <div class="images-grid">
                    <div class="image-card">
                        <img src="${originalUrl}" alt="原图" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🖼️</text></svg>'" />
                        <div class="label">原图</div>
                    </div>
                    <div class="image-card">
                        <img src="${referenceUrl}" alt="参考图" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🖼️</text></svg>'" />
                        <div class="label">参考图</div>
                        <div class="score">与风格匹配度: ${formatSimilarity(sim.style_reference)}</div>
                    </div>
                    <div class="image-card">
                        <img src="${resultUrl}" alt="结果图" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🖼️</text></svg>'" />
                        <div class="label">结果图</div>
                        <div class="score">与风格匹配度: ${formatSimilarity(sim.style_result)}</div>
                    </div>
                </div>
                
                <div class="similarity-section">
                    <h3>相似度分析</h3>
                    <div class="similarity-grid">
                        <div class="similarity-card">
                            <div class="label">原图 vs 参考图</div>
                            <div class="value">${formatSimilarity(sim.original_reference)}</div>
                        </div>
                        <div class="similarity-card">
                            <div class="label">原图 vs 结果图</div>
                            <div class="value">${formatSimilarity(sim.original_result)}</div>
                        </div>
                        <div class="similarity-card">
                            <div class="label">参考图 vs 结果图</div>
                            <div class="value">${formatSimilarity(sim.reference_result)}</div>
                        </div>
                        <div class="similarity-card">
                            <div class="label">风格 vs 参考图</div>
                            <div class="value">${formatSimilarity(sim.style_reference)}</div>
                        </div>
                    </div>
                </div>
                
                ${suggestionsHtml}
                
                ${networkHtml}
                
                ${generatedHtml}
                
                <div class="metadata-section">
                    <h3>元数据</h3>
                    <div class="metadata-item">
                        <span class="key">目标风格</span>
                        <span class="value">${caseData.style || '-'}</span>
                    </div>
                    <div class="metadata-item">
                        <span class="key">原图类型</span>
                        <span class="value">${caseData.metadata?.['Base Image Type'] || '-'}</span>
                    </div>
                    <div class="metadata-item">
                        <span class="key">风格强度</span>
                        <span class="value">${caseData.metadata?.style_strength || '-'}</span>
                    </div>
                    <div class="metadata-item">
                        <span class="key">指令</span>
                        <span class="value">${caseData.metadata?.instruction || '-'}</span>
                    </div>
                </div>
            `;
            
            modalOverlay.classList.add('active');
        }
        
        async function loadCases() {
            const loading = document.getElementById('loading');
            const casesList = document.getElementById('casesList');
            
            loading.style.display = 'block';
            casesList.innerHTML = '';
            
            try {
                const caseNames = await fetch(`${API_BASE}/api/cases`).then(r => r.json());
                
                if (caseNames.length > 0) {
                    caseNames.forEach(caseName => {
                        const card = createCaseCard(caseName);
                        casesList.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                alert('加载案例列表失败: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        function handleImageError(img) {
            img.style.display = 'none';
            const fallback = img.parentElement.querySelector('.fallback-content');
            if (fallback) {
                fallback.style.display = 'flex';
                fallback.style.flexDirection = 'column';
                fallback.style.alignItems = 'center';
                fallback.style.justifyContent = 'center';
            }
        }
        
        function openImageViewer(imageUrl) {
            const viewer = document.getElementById('imageViewer');
            const img = viewer.querySelector('img');
            
            let displayUrl = imageUrl;
            if (imageUrl && imageUrl.startsWith('http')) {
                displayUrl = '/proxy/image?url=' + encodeURIComponent(imageUrl);
            }
            
            img.src = displayUrl;
            viewer.classList.add('active');
        }
        
        async function refreshNetworkSearch(caseName) {
            const btn = document.getElementById('refreshNetworkBtn');
            const section = document.getElementById('networkSection');
            
            btn.disabled = true;
            btn.classList.add('loading');
            btn.innerHTML = '<div class="spinner-small"></div>搜索中...';
            
            const overlay = document.createElement('div');
            overlay.className = 'refreshing-overlay';
            overlay.innerHTML = '<div class="spinner"></div><p style="color: #667eea; font-weight: 500;">正在重新搜索...</p>';
            section.style.position = 'relative';
            section.appendChild(overlay);
            
            try {
                const response = await fetch(`/api/refresh_network/${caseName}`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                overlay.remove();
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.innerHTML = '🔄 重新搜索';
                
                if (result.error) {
                    alert('搜索失败: ' + result.error);
                    return;
                }
                
                let networkHtml = '';
                if (result.results && result.results.length > 0) {
                    networkHtml = `
                        <div class="section-header">
                            <h3>网络搜索参考图</h3>
                            <button class="refresh-btn" id="refreshNetworkBtn" onclick="refreshNetworkSearch('${caseName}')">
                                🔄 重新搜索
                            </button>
                        </div>
                        ${result.caption ? `
                        <div class="caption-info">
                            <span class="caption-label">结果图描述：</span>
                            <span class="caption-text">${result.caption}</span>
                        </div>
                        ` : ''}
                        ${result.keywords && result.keywords.length > 0 ? `
                        <div class="keywords-info">
                            <span class="keywords-label">搜索关键词：</span>
                            <div class="keywords-tags">
                                ${result.keywords.map(keyword => `
                                    <span class="keyword-tag">${keyword}</span>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                        <div class="suggestions-grid">
                            ${result.results.map((ref, idx) => {
                                let imgUrl = ref.image_url || ref.thumbnail_url || ref.original_url || '';
                                if (imgUrl && imgUrl.startsWith('http://')) {
                                    imgUrl = imgUrl.replace('http://', 'https://');
                                }
                                let proxyUrl = '/proxy/image?url=' + encodeURIComponent(imgUrl);
                                return `
                                <div class="suggestion-card network">
                                    <div class="image-container" onclick="openImageViewer('${imgUrl}')" style="cursor:zoom-in;">
                                        <img src="${proxyUrl}" alt="网络图${idx+1}" 
                                             onerror="handleImageError(this);" />
                                        <div class="zoom-overlay">
                                            <span class="zoom-icon">🔍 点击放大</span>
                                        </div>
                                        <div class="fallback-content" style="display:none;">
                                            <p style="font-size:12px;color:#666;margin-bottom:8px;">🖼️ 图片加载失败</p>
                                            <a href="${imgUrl}" target="_blank" rel="noopener noreferrer" 
                                               class="image-link">${imgUrl}</a>
                                        </div>
                                    </div>
                                    <div class="info">
                                        <div class="score">相似度: ${(ref.similarity * 100).toFixed(1)}%</div>
                                        <div class="keywords">${ref.title || '无标题'}</div>
                                        <div class="source">来源: ${ref.source || '网络'}</div>
                                    </div>
                                </div>
                            `;
                            }).join('')}
                        </div>
                    `;
                } else {
                    networkHtml = `
                        <div class="section-header">
                            <h3>网络搜索参考图</h3>
                            <button class="refresh-btn" id="refreshNetworkBtn" onclick="refreshNetworkSearch('${caseName}')">
                                🔄 重新搜索
                            </button>
                        </div>
                        <div style="text-align: center; padding: 40px; color: #666;">
                            <p>未找到网络搜索结果</p>
                        </div>
                    `;
                }
                
                section.innerHTML = networkHtml;
                
            } catch (error) {
                overlay.remove();
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.innerHTML = '🔄 重新搜索';
                console.error('Error refreshing network search:', error);
                alert('重新搜索失败: ' + error.message);
            }
        }
        
        async function refreshGeneratedImages(caseName) {
            const btn = document.getElementById('refreshGeneratedBtn');
            const section = document.getElementById('generatedSection');
            
            btn.disabled = true;
            btn.classList.add('loading');
            btn.innerHTML = '<div class="spinner-small"></div>生成中...';
            
            const overlay = document.createElement('div');
            overlay.className = 'refreshing-overlay';
            overlay.innerHTML = '<div class="spinner"></div><p style="color: #667eea; font-weight: 500;">正在生成图片...</p>';
            section.style.position = 'relative';
            section.appendChild(overlay);
            
            try {
                const response = await fetch(`/api/refresh_generated/${caseName}`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                overlay.remove();
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.innerHTML = '🔄 重新生成';
                
                if (result.error) {
                    alert('生成失败: ' + result.error);
                    return;
                }
                
                let generatedHtml = '';
                if (result.images && result.images.length > 0) {
                    generatedHtml = `
                        <div class="section-header">
                            <h3>
                                <span class="text-to-image-badge">🎨 文生图</span>
                                生成的参考图
                            </h3>
                            <button class="refresh-btn" id="refreshGeneratedBtn" onclick="refreshGeneratedImages('${caseName}')">
                                🔄 重新生成
                            </button>
                        </div>
                        ${result.prompt ? `
                        <div class="generation-prompt-info">
                            <span class="prompt-label">文生图 Prompt：</span>
                            <span class="prompt-text">${result.prompt}</span>
                        </div>
                        ` : ''}
                        <div class="suggestions-grid">
                            ${result.images.map((imgUrl, idx) => {
                                let proxyUrl = '/proxy/image?url=' + encodeURIComponent(imgUrl);
                                return `
                                <div class="suggestion-card generated text-to-image">
                                    <div class="image-container" onclick="openImageViewer('${imgUrl}')" style="cursor:zoom-in;">
                                        <img src="${proxyUrl}" alt="文生图${idx+1}" 
                                             onerror="handleImageError(this);" />
                                        <div class="zoom-overlay">
                                            <span class="zoom-icon">🔍 点击放大</span>
                                        </div>
                                        <div class="fallback-content" style="display:none;">
                                            <p style="font-size:12px;color:#666;margin-bottom:8px;">🖼️ 图片加载失败</p>
                                            <a href="${imgUrl}" target="_blank" rel="noopener noreferrer" 
                                               class="image-link">${imgUrl}</a>
                                        </div>
                                    </div>
                                    <div class="info">
                                        <div class="score">文生图 ${idx+1}</div>
                                        <div class="source">来源: 豆包文生图模型</div>
                                    </div>
                                </div>
                            `;
                            }).join('')}
                        </div>
                    `;
                } else {
                    generatedHtml = `
                        <div class="section-header">
                            <h3>
                                <span class="text-to-image-badge">🎨 文生图</span>
                                生成的参考图
                            </h3>
                            <button class="refresh-btn" id="refreshGeneratedBtn" onclick="refreshGeneratedImages('${caseName}')">
                                🔄 重新生成
                            </button>
                        </div>
                        <div style="text-align: center; padding: 40px; color: #666;">
                            <p>未能生成图片</p>
                        </div>
                    `;
                }
                
                section.innerHTML = generatedHtml;
                
            } catch (error) {
                overlay.remove();
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.innerHTML = '🔄 重新生成';
                console.error('Error refreshing generated images:', error);
                alert('重新生成失败: ' + error.message);
            }
        }

        
        function closeImageViewer() {
            const viewer = document.getElementById('imageViewer');
            viewer.classList.remove('active');
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('modalOverlay').classList.remove('active');
            });
            
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalOverlay')) {
                    document.getElementById('modalOverlay').classList.remove('active');
                }
            });
            
            const imageViewer = document.getElementById('imageViewer');
            imageViewer.addEventListener('click', (e) => {
                if (e.target === imageViewer || e.target.classList.contains('image-viewer-close')) {
                    closeImageViewer();
                }
            });
            
            loadCases();
        });
    </script>
    
    <div id="imageViewer" class="image-viewer-overlay">
        <div class="image-viewer-content">
            <button class="image-viewer-close" onclick="closeImageViewer()">×</button>
            <img src="" alt="放大查看">
        </div>
    </div>
</body>
</html>
